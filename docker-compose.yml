services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cristian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-crovato}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cristian} -d ${POSTGRES_DB:-crovato}"]
      interval: 5s
      timeout: 5s
      retries: 10

  next:
    build:
      context: .
      dockerfile: docker/next/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-cristian}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-crovato}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-changeme-in-production}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3001:3000"
    volumes:
      # Mount source for hot reload in dev
      - .:/app
      - /app/node_modules
      - /app/.next

  playwright:
    build:
      context: .
      dockerfile: docker/playwright/Dockerfile
    profiles:
      - testing
    depends_on:
      - next
    environment:
      BASE_URL: http://next:3000
    volumes:
      - ./playwright:/app/playwright
      - ./playwright.config.ts:/app/playwright.config.ts
      - ./node_modules:/app/node_modules:ro

volumes:
  pgdata:
